<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Meta optimizado para evitar zoom involuntario en móviles al escribir -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Para ti ❤️</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png">
    <link rel="stylesheet" href="style.css?v=3">
    <!-- Importamos FontAwesome por si decides usar iconos más finos después -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<!-- Capa de entrada -->
<div id="overlay">
    <button onclick="iniciarRegalo()">Abrir</button>
</div>

<!-- Capas del Jardín -->
<div id="garden-fondo" class="garden"></div>
<div id="garden-frente" class="garden"></div>

<!-- Cabecera con el Corazón Interactivo -->
<div class="titulo">
    Para ti, <span class="nombre">Mi Amor</span> 
    <span id="corazon-secreto" onclick="revelarChat()">❤️</span>
</div>

<!-- Contenedor del Poema -->
<div class="poema">
    <div id="texto-poema"></div>
</div>

<!-- Interfaz del Chat -->
<div class="chat-container">
    <div class="chat-header">
        Nuestro Rincón ✨
        <span class="cerrar-chat" onclick="cerrarChat()" style="cursor:pointer;">×</span>
    </div>
    
    <div id="historial-chat"></div>

    <div class="input-area">
        <!-- Input de texto principal -->
        <input type="text" id="nuevo-mensaje" placeholder="Escribe algo..." 
               onkeypress="if(event.key === 'Enter') enviarMensaje()">
        
        <!-- CRONÓMETRO: Se activa mediante JS al grabar -->
        <span id="timer-grabacion" style="display:none;">00:00</span>
        
        <!-- Botón de Micrófono (ahora con ID para el JS) -->
        <button id="btn-record" class="btn-audio">
            <i class="fas fa-microphone"></i>
        </button> 
        
        <!-- Botón de Enviar -->
        <button onclick="enviarMensaje()" class="btn-send">
            <svg viewBox="0 0 24 24" style="width:18px; fill:currentColor;">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
            </svg>
        </button>
    </div>
</div>

<!-- Elementos Multimedia -->
<audio id="musica" loop>
    <source src="cancion.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
